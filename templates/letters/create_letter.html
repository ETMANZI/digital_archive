{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    /* ========== ALL STYLES FOR THE LETTER PAGE ========== */
    
    /* Container Styles */
    .letter-page-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    /* Editor Section Styles */
    .editor-section {
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        padding: 30px;
        margin-bottom: 30px;
    }

    .editor-section h2 {
        color: #333;
        margin-bottom: 20px;
        font-size: 28px;
        font-family: Arial, sans-serif;
    }

    .editor-section .form-group {
        margin-bottom: 20px;
    }

    .editor-section label {
        font-weight: 600;
        display: block;
        margin-bottom: 8px;
        color: #555;
        font-family: Arial, sans-serif;
    }

    .editor-section .form-control {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 16px;
        transition: border-color 0.3s;
        font-family: Arial, sans-serif;
    }

    .editor-section .form-control:focus {
        border-color: #667eea;
        outline: none;
    }

    /* Quill Editor Styles */
    #editor-container {
        height: 400px;
        margin-bottom: 10px;
        background: white;
    }

    .ql-editor {
        min-height: 350px;
        font-size: 12pt;
        line-height: 1.8;
        font-family: 'Times New Roman', Times, serif;
    }

    .editor-hint {
        color: #6c757d;
        font-size: 14px;
        margin-top: 8px;
        display: block;
        font-family: Arial, sans-serif;
    }

    .btn-preview {
        background: #28a745;
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
        width: 100%;
        font-family: Arial, sans-serif;
    }

    .btn-preview:hover {
        background: #218838;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(40,167,69,0.3);
    }

    .btn-preview:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
    }

    /* ========== LETTER PREVIEW STYLES ========== */
    .letter-preview-section {
        margin-top: 30px;
        display: none;
    }

    .letter-preview-section.active {
        display: block;
    }

    .preview-actions {
        max-width: 794px;
        margin: 0 auto 20px auto;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .preview-actions .btn {
        padding: 10px 25px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
        font-family: Arial, sans-serif;
    }

    .btn-print {
        background: #007bff;
        color: white;
    }

    .btn-print:hover {
        background: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0,123,255,0.3);
    }

    .btn-edit {
        background: #6c757d;
        color: white;
    }

    .btn-edit:hover {
        background: #5a6268;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(108,117,125,0.3);
    }

    .btn-download {
        background: #28a745;
        color: white;
    }

    .btn-download:hover {
        background: #218838;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(40,167,69,0.3);
    }

    /* Letter Container - A4 Page */
    .letter-wrapper {
        max-width: 794px;
        margin: 0 auto;
        background: white;
        box-shadow: 0 0 20px rgba(0,0,0,0.15);
    }

    .letter-container {
        position: relative;
        width: 100%;
        min-height: 1123px;
        background: white;
        display: flex;
        flex-direction: column;
    }

    /* Header Styles - Fixed at top */
    .letter-header {
        width: 100%;
        flex-shrink: 0;
        z-index: 10;
    }

    .letter-header img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Footer Styles - Fixed at bottom */
    .letter-footer {
        width: 100%;
        flex-shrink: 0;
        z-index: 10;
        margin-top: auto;
    }

    .letter-footer img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Content Area - Middle section */
    .letter-content {
        flex: 1;
        padding: 50px 60px 40px 60px;
        background: white;
        min-height: 400px;
    }

    .letter-content .letter-title {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 25px;
        text-align: center;
        font-family: 'Times New Roman', Times, serif;
    }

    .letter-content .letter-body {
        line-height: 1.8;
        font-size: 12pt;
        color: #333;
        font-family: 'Times New Roman', Times, serif;
    }

    .letter-content .letter-body p {
        margin-bottom: 12px;
    }

    /* ========== PRINT STYLES ========== */
    @media print {
        body {
            background: white !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        
        .no-print {
            display: none !important;
        }
        
        .letter-page-wrapper {
            padding: 0 !important;
            max-width: 100% !important;
        }
        
        .letter-wrapper {
            box-shadow: none !important;
            max-width: 100% !important;
            margin: 0 !important;
        }
        
        .letter-container {
            width: 100% !important;
            min-height: 100vh !important;
            position: relative !important;
        }
        
        .letter-header {
            position: running(header) !important;
            width: 100% !important;
        }
        
        .letter-footer {
            position: running(footer) !important;
            width: 100% !important;
        }
        
        .letter-content {
            padding: 40px 60px !important;
            margin-top: 20px !important;
            margin-bottom: 20px !important;
        }
        
        .letter-content .letter-body {
            font-size: 12pt !important;
        }
        
        @page {
            size: A4;
            margin: 0;
            @top-center {
                content: element(header);
            }
            @bottom-center {
                content: element(footer);
            }
        }
        
        /* Fallback for browsers that support position:fixed in print */
        .letter-header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
        }
        
        .letter-footer {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
        }
        
        .letter-content {
            margin-top: 180px !important;
            margin-bottom: 160px !important;
        }
    }

    /* ========== SCREEN STYLES ========== */
    @media screen {
        .letter-wrapper {
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            margin: 30px auto;
        }
        
        .letter-header {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .letter-footer {
            position: sticky;
            bottom: 0;
            z-index: 10;
        }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 820px) {
        .letter-wrapper,
        .preview-actions {
            max-width: 100%;
            margin: 10px;
        }
        
        .letter-content {
            padding: 30px 25px !important;
        }
        
        .preview-actions .btn {
            padding: 8px 16px;
            font-size: 14px;
            width: 100%;
            text-align: center;
        }

        .editor-section {
            padding: 15px;
        }

        #editor-container {
            height: 300px;
        }
    }

    /* Loading overlay */
    .loading-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 9999;
        justify-content: center;
        align-items: center;
    }

    .loading-overlay.active {
        display: flex;
    }

    .loading-spinner {
        background: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
    }

    .loading-spinner .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-spinner p {
        margin: 0;
        color: #333;
        font-weight: 600;
        font-family: Arial, sans-serif;
    }

    /* Header/Footer fallback styles when image fails to load */
    .header-fallback {
        padding: 30px;
        background: #1a3c6e;
        color: white;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
        font-family: Arial, sans-serif;
    }

    .header-fallback span {
        font-size: 14px;
        font-weight: normal;
        display: block;
        margin-top: 5px;
    }

    .footer-fallback {
        padding: 20px;
        background: #1a3c6e;
        color: white;
        text-align: center;
        font-size: 14px;
        font-family: Arial, sans-serif;
    }
</style>
{% endblock %}

{% block content %}
<div class="letter-page-wrapper">
    <!-- Editor Section -->
    <div class="editor-section" id="editorSection">
        <h2>📝 Write Your Letter</h2>
        
        <form id="letterForm" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Letter Title</label>
                <input type="text" 
                       name="title" 
                       id="title" 
                       class="form-control" 
                       placeholder="Enter letter title..." 
                       required>
            </div>
            
            <div class="form-group">
                <label>Letter Content</label>
                <div id="editor-container"></div>
                <textarea name="content" id="content" style="display:none;"></textarea>
                <small class="editor-hint">
                    💡 Use the toolbar to format your text (bold, italic, lists, alignment, etc.)
                </small>
            </div>
            
            <button type="submit" class="btn-preview" id="previewBtn">
                📄 Preview Letter with Header/Footer
            </button>
        </form>
    </div>

    <!-- Letter Preview Section -->
    <div class="letter-preview-section" id="previewSection">
        <!-- Action Buttons -->
        <div class="preview-actions no-print">
            <button onclick="printLetter()" class="btn btn-print">
                🖨️ Print / Save as PDF
            </button>
            <button onclick="showEditor()" class="btn btn-edit">
                ✏️ Edit Letter
            </button>
            <button onclick="downloadPDF()" class="btn btn-download" id="downloadBtn">
                ⬇️ Download PDF
            </button>
        </div>

        <!-- Letter with Fixed Header and Footer -->
        <div class="letter-wrapper">
            <div class="letter-container" id="letterContainer">
                <!-- Header -->
                <div class="letter-header">
                    <img src="{% static 'images/ecologo.png' %}" 
                         alt="Letterhead Header"
                         onerror="this.outerHTML='<div class=\'header-fallback\'>ECOBANK<span>The Pan African Bank</span></div>'">
                </div>

                <!-- Content -->
                <div class="letter-content">
                    <div class="letter-title" id="previewTitle"></div>
                    <div class="letter-body" id="previewContent"></div>
                </div>

                <!-- Footer -->
                <div class="letter-footer">
                    <img src="{% static 'images/ecologo.png' %}" 
                         alt="Letterhead Footer"
                         onerror="this.outerHTML='<div class=\'footer-fallback\'>ECOBANK - The Pan African Bank</div>'">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Generating your letter...</p>
    </div>
</div>

<!-- Quill Editor Dependencies -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Initialize Quill editor
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Start writing your letter here...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                ['blockquote', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'indent': '-1'}, { 'indent': '+1' }],
                [{ 'align': [] }],
                ['link'],
                ['clean']
            ]
        }
    });

    // Auto-save content to localStorage
    quill.on('text-change', function() {
        var content = quill.root.innerHTML;
        localStorage.setItem('letterContent', content);
    });

    // Restore saved content
    document.addEventListener('DOMContentLoaded', function() {
        var savedContent = localStorage.getItem('letterContent');
        var savedTitle = localStorage.getItem('letterTitle');
        
        if (savedContent) {
            quill.root.innerHTML = savedContent;
        }
        if (savedTitle) {
            document.getElementById('title').value = savedTitle;
        }
    });

    // Handle form submission
    var form = document.getElementById('letterForm');
    var previewSection = document.getElementById('previewSection');
    var editorSection = document.getElementById('editorSection');
    var loadingOverlay = document.getElementById('loadingOverlay');

    form.onsubmit = function(e) {
        e.preventDefault();
        
        // Get content from Quill
        var content = quill.root.innerHTML;
        var title = document.getElementById('title').value;
        
        // Validate
        if (!title.trim()) {
            alert('Please enter a letter title.');
            return;
        }
        
        if (!content.trim() || content === '<p><br></p>') {
            alert('Please enter some content for your letter.');
            return;
        }
        
        // Show loading
        loadingOverlay.classList.add('active');
        
        // Store in localStorage
        localStorage.setItem('letterTitle', title);
        localStorage.setItem('letterContent', content);
        
        // Set the hidden textarea
        document.getElementById('content').value = content;
        
        // Display preview
        setTimeout(function() {
            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewContent').innerHTML = content;
            
            // Hide loading, show preview
            loadingOverlay.classList.remove('active');
            editorSection.style.display = 'none';
            previewSection.classList.add('active');
            
            // Scroll to preview
            previewSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 500);
    };

    // Show editor function
    function showEditor() {
        previewSection.classList.remove('active');
        editorSection.style.display = 'block';
        document.getElementById('title').value = localStorage.getItem('letterTitle') || '';
        if (localStorage.getItem('letterContent')) {
            quill.root.innerHTML = localStorage.getItem('letterContent');
        }
        editorSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Print function
    function printLetter() {
        window.print();
    }

    // Download PDF function
    function downloadPDF() {
        var title = document.getElementById('previewTitle').textContent;
        var content = document.getElementById('previewContent').innerHTML;
        
        if (!title || !content) {
            alert('No content to download. Please create a letter first.');
            return;
        }
        
        // Show loading
        loadingOverlay.classList.add('active');
        
        // Send to server to generate PDF
        fetch('/download-pdf/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify({
                title: title,
                content: content
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.blob();
        })
        .then(blob => {
            var url = window.URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = title + '.pdf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            loadingOverlay.classList.remove('active');
        })
        .catch(error => {
            console.error('Error downloading PDF:', error);
            loadingOverlay.classList.remove('active');
            alert('Error generating PDF. Please use the Print option instead.');
        });
    }

    // Keyboard shortcut for printing (Ctrl+P)
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
            if (previewSection.classList.contains('active')) {
                e.preventDefault();
                printLetter();
            }
        }
    });

    // If there's content in localStorage, show preview immediately
    document.addEventListener('DOMContentLoaded', function() {
        var savedTitle = localStorage.getItem('letterTitle');
        var savedContent = localStorage.getItem('letterContent');
        
        if (savedTitle && savedContent && savedContent !== '<p><br></p>') {
            document.getElementById('title').value = savedTitle;
            document.getElementById('previewTitle').textContent = savedTitle;
            document.getElementById('previewContent').innerHTML = savedContent;
            document.getElementById('content').value = savedContent;
            
            // Auto-show preview on page load
            editorSection.style.display = 'none';
            previewSection.classList.add('active');
        }
    });
</script>
{% endblock %}
